spring:
  application:
    name: aiops-server
  
  # MySQL数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/aiops?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 2509841336
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
  # SQL初始化
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  
  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  
  # Kafka配置（可选）
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: aiops-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    enabled: false
  
  # Spring AI 配置
  ai:
    # OpenAI 配置
    openai:
      api-key: d00b0951-5243-4da0-86ad-9c7dc21bc681
      # 火山引擎方舟 OpenAI 兼容 API
      base-url: https://ark.cn-beijing.volces.com/api/coding
      chat:
        options:
          model: doubao-seed-2.0-lite
          temperature: 0.7
          timeoutSeconds: 120
    
    # Anthropic (Claude) 配置 - 有bug，暂时禁用
    # anthropic:
    #   api-key: your-api-key
    #   base-url: https://api.anthropic.com
    #   chat:
    #     options:
    #       model: claude-3-5-sonnet-20241022
    #       temperature: 0.7

# 服务配置
server:
  port: 8080

# 日志配置
logging:
  level:
    root: INFO
    com.aiops.bigdata: DEBUG
    org.springframework.web: INFO
    org.springframework.ai: DEBUG
    org.springframework.http: DEBUG
    org.springframework.web.client: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# AIOps业务配置
aiops:
  metrics:
    retention-days: 30
    max-cache-size: 10000
  
  analysis:
    default-depth: normal
    timeout-seconds: 60
  
  # LLM配置
  llm:
    # 是否使用 Mock 模式（当真实 LLM 不可用时）
    use-mock: false
    # Mock 模式延迟（毫秒）
    mock-delay-ms: 500
