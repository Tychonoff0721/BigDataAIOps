<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIOps - 大数据集群智能运维平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
        }
        
        .status-healthy { background: rgba(0, 200, 83, 0.2); color: #00c853; }
        .status-warning { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
        .status-critical { background: rgba(244, 67, 54, 0.2); color: #f44336; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .metric-value {
            font-size: 48px;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .metric-label {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
        
        .progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 15px;
        }
        
        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        .progress-green { background: linear-gradient(90deg, #00c853, #69f0ae); }
        .progress-yellow { background: linear-gradient(90deg, #ffc107, #ffeb3b); }
        .progress-red { background: linear-gradient(90deg, #f44336, #ff5252); }
        
        .analysis-section {
            grid-column: span 2;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.8);
        }
        
        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 14px;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            color: #fff;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .result-box {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab {
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }
        
        .tab.active {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
        }
        
        .tab:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .alert-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .alert-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid;
        }
        
        .alert-critical { border-color: #f44336; }
        .alert-warning { border-color: #ffc107; }
        
        .alert-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 18px;
        }
        
        .alert-critical .alert-icon { background: rgba(244, 67, 54, 0.2); }
        .alert-warning .alert-icon { background: rgba(255, 193, 7, 0.2); }
        
        .alert-content {
            flex: 1;
        }
        
        .alert-title {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .alert-desc {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #00d4ff;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .cluster-select {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .cluster-btn {
            padding: 8px 16px;
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .cluster-btn.active {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">AIOps 智能运维平台</div>
            <div>
                <span class="status-badge status-healthy" id="systemStatus">系统正常</span>
            </div>
        </header>
        
        <!-- 集群选择 -->
        <div class="cluster-select">
            <button class="cluster-btn active" onclick="selectCluster('bigdata-prod')">bigdata-prod</button>
            <button class="cluster-btn" onclick="selectCluster('bigdata-test')">bigdata-test</button>
        </div>
        
        <!-- 概览卡片 -->
        <div class="grid">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">集群健康度</span>
                    <span class="status-badge status-healthy" id="healthBadge">健康</span>
                </div>
                <div class="metric-value" id="healthScore">--</div>
                <div class="metric-label">综合健康评分</div>
                <div class="progress-bar">
                    <div class="progress-fill progress-green" id="healthProgress" style="width: 0%"></div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <span class="card-title">节点状态</span>
                </div>
                <div class="metric-value" id="nodeCount">--/--</div>
                <div class="metric-label">活跃节点 / 总节点</div>
                <div class="progress-bar">
                    <div class="progress-fill progress-green" id="nodeProgress" style="width: 0%"></div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <span class="card-title">HDFS使用率</span>
                </div>
                <div class="metric-value" id="hdfsUsage">--%</div>
                <div class="metric-label">已使用 / 总容量</div>
                <div class="progress-bar">
                    <div class="progress-fill progress-yellow" id="hdfsProgress" style="width: 0%"></div>
                </div>
            </div>
        </div>
        
        <!-- 分析和告警 -->
        <div class="grid">
            <div class="card analysis-section">
                <div class="card-header">
                    <span class="card-title">AI 智能分析</span>
                </div>
                
                <div class="tabs">
                    <div class="tab active" onclick="switchTab('component')">组件分析</div>
                    <div class="tab" onclick="switchTab('spark')">Spark作业分析</div>
                </div>
                
                <!-- 组件分析表单 -->
                <div id="componentForm">
                    <div class="form-group">
                        <label>服务类型</label>
                        <select class="form-control" id="serviceType">
                            <option value="hdfs">HDFS</option>
                            <option value="yarn">YARN</option>
                            <option value="spark">Spark</option>
                            <option value="kafka">Kafka</option>
                            <option value="hive">Hive</option>
                            <option value="flink">Flink</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>组件类型</label>
                        <select class="form-control" id="componentType">
                            <option value="namenode">NameNode</option>
                            <option value="datanode">DataNode</option>
                            <option value="resourcemanager">ResourceManager</option>
                            <option value="nodemanager">NodeManager</option>
                            <option value="master">Master</option>
                            <option value="worker">Worker</option>
                            <option value="broker">Broker</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>CPU使用率 (0-1)</label>
                        <input type="number" class="form-control" id="cpuUsage" value="0.75" step="0.01" min="0" max="1">
                    </div>
                    <div class="form-group">
                        <label>内存使用率 (0-1)</label>
                        <input type="number" class="form-control" id="memoryUsage" value="0.82" step="0.01" min="0" max="1">
                    </div>
                    <div class="form-group">
                        <label>GC时间 (ms)</label>
                        <input type="number" class="form-control" id="gcTime" value="2500">
                    </div>
                    <button class="btn btn-primary" onclick="analyzeComponent()">
                        <span id="analyzeBtn">开始分析</span>
                    </button>
                </div>
                
                <!-- Spark分析表单 -->
                <div id="sparkForm" class="hidden">
                    <div class="form-group">
                        <label>作业名称</label>
                        <input type="text" class="form-control" id="appName" value="ETL-Job-001">
                    </div>
                    <div class="form-group">
                        <label>执行时长 (ms)</label>
                        <input type="number" class="form-control" id="duration" value="300000">
                    </div>
                    <div class="form-group">
                        <label>Executor数量</label>
                        <input type="number" class="form-control" id="executorCount" value="10">
                    </div>
                    <div class="form-group">
                        <label>数据倾斜率</label>
                        <input type="number" class="form-control" id="skewRatio" value="5.5" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>Shuffle比例</label>
                        <input type="number" class="form-control" id="shuffleRatio" value="0.45" step="0.01" min="0" max="1">
                    </div>
                    <button class="btn btn-primary" onclick="analyzeSpark()">
                        <span id="sparkAnalyzeBtn">开始分析</span>
                    </button>
                </div>
                
                <div class="result-box" id="analysisResult">
等待分析...
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <span class="card-title">告警列表</span>
                    <button class="btn btn-secondary" onclick="generateTestData()">生成测试数据</button>
                </div>
                <div class="alert-list" id="alertList">
                    <div style="text-align: center; padding: 40px; color: rgba(255,255,255,0.5);">
                        暂无告警
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = '/v1';
        let currentCluster = 'bigdata-prod';
        
        // 页面加载时获取数据
        document.addEventListener('DOMContentLoaded', () => {
            fetchClusterOverview();
            fetchAlerts();
        });
        
        // 选择集群
        function selectCluster(cluster) {
            currentCluster = cluster;
            document.querySelectorAll('.cluster-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === cluster) {
                    btn.classList.add('active');
                }
            });
            fetchClusterOverview();
            fetchAlerts();
        }
        
        // 获取集群概览
        async function fetchClusterOverview() {
            try {
                const response = await fetch(`${API_BASE}/status/overview?cluster=${currentCluster}`);
                const data = await response.json();
                
                if (data.cluster) {
                    const status = data.cluster;
                    
                    // 更新健康评分
                    const healthScore = status.avgClusterLoad ? Math.round((1 - status.avgClusterLoad) * 100) : 85;
                    document.getElementById('healthScore').textContent = healthScore;
                    document.getElementById('healthProgress').style.width = healthScore + '%';
                    
                    // 更新节点状态
                    const activeNodes = status.activeNodes || 0;
                    const totalNodes = status.totalNodes || 0;
                    document.getElementById('nodeCount').textContent = `${activeNodes}/${totalNodes}`;
                    document.getElementById('nodeProgress').style.width = (totalNodes > 0 ? (activeNodes / totalNodes * 100) : 0) + '%';
                    
                    // 更新HDFS使用率
                    const hdfsUsage = status.hdfsUsageRate ? (status.hdfsUsageRate * 100).toFixed(1) : 0;
                    document.getElementById('hdfsUsage').textContent = hdfsUsage + '%';
                    document.getElementById('hdfsProgress').style.width = hdfsUsage + '%';
                    
                    // 更新进度条颜色
                    updateProgressColor('hdfsProgress', parseFloat(hdfsUsage));
                }
            } catch (error) {
                console.error('获取集群概览失败:', error);
            }
        }
        
        // 更新进度条颜色
        function updateProgressColor(elementId, value) {
            const element = document.getElementById(elementId);
            element.classList.remove('progress-green', 'progress-yellow', 'progress-red');
            if (value < 60) {
                element.classList.add('progress-green');
            } else if (value < 85) {
                element.classList.add('progress-yellow');
            } else {
                element.classList.add('progress-red');
            }
        }
        
        // 获取告警列表
        async function fetchAlerts() {
            try {
                const response = await fetch(`${API_BASE}/events/alerts?cluster=${currentCluster}`);
                const data = await response.json();
                
                const alertList = document.getElementById('alertList');
                
                if (data.alerts && data.alerts.length > 0) {
                    alertList.innerHTML = data.alerts.map(alert => `
                        <div class="alert-item alert-${alert.severity?.code || 'warning'}">
                            <div class="alert-icon">${alert.severity?.code === 'critical' ? '!' : '⚠'}</div>
                            <div class="alert-content">
                                <div class="alert-title">${alert.title || '未知告警'}</div>
                                <div class="alert-desc">${alert.description || ''} - ${alert.service || ''}/${alert.component || ''}</div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    alertList.innerHTML = `
                        <div style="text-align: center; padding: 40px; color: rgba(255,255,255,0.5);">
                            暂无告警
                        </div>
                    `;
                }
            } catch (error) {
                console.error('获取告警失败:', error);
            }
        }
        
        // 切换Tab
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'component') {
                document.getElementById('componentForm').classList.remove('hidden');
                document.getElementById('sparkForm').classList.add('hidden');
            } else {
                document.getElementById('componentForm').classList.add('hidden');
                document.getElementById('sparkForm').classList.remove('hidden');
            }
        }
        
        // 组件分析
        async function analyzeComponent() {
            const btn = document.getElementById('analyzeBtn');
            btn.innerHTML = '<span class="loading"></span> 分析中...';
            
            const metrics = {
                cluster: currentCluster,
                service: document.getElementById('serviceType').value,
                component: document.getElementById('componentType').value,
                instance: 'instance-1',
                cpuUsage: parseFloat(document.getElementById('cpuUsage').value),
                memoryUsage: parseFloat(document.getElementById('memoryUsage').value),
                gcTime: parseInt(document.getElementById('gcTime').value),
                timestamp: Date.now() / 1000,
                metrics: {}
            };
            
            try {
                const response = await fetch(`${API_BASE}/analyze/component`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(metrics)
                });
                
                const result = await response.json();
                document.getElementById('analysisResult').textContent = 
                    JSON.stringify(result, null, 2);
            } catch (error) {
                document.getElementById('analysisResult').textContent = 
                    '分析失败: ' + error.message;
            }
            
            btn.textContent = '开始分析';
        }
        
        // Spark作业分析
        async function analyzeSpark() {
            const btn = document.getElementById('sparkAnalyzeBtn');
            btn.innerHTML = '<span class="loading"></span> 分析中...';
            
            const metrics = {
                cluster: currentCluster,
                jobId: 'job-' + Date.now(),
                appName: document.getElementById('appName').value,
                status: 'RUNNING',
                duration: parseInt(document.getElementById('duration').value),
                executorCount: parseInt(document.getElementById('executorCount').value),
                executorMemoryGB: 4,
                executorCores: 2,
                skewRatio: parseFloat(document.getElementById('skewRatio').value),
                shuffleRatio: parseFloat(document.getElementById('shuffleRatio').value),
                timestamp: Date.now() / 1000
            };
            
            try {
                const response = await fetch(`${API_BASE}/analyze/spark`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(metrics)
                });
                
                const result = await response.json();
                document.getElementById('analysisResult').textContent = 
                    JSON.stringify(result, null, 2);
            } catch (error) {
                document.getElementById('analysisResult').textContent = 
                    '分析失败: ' + error.message;
            }
            
            btn.textContent = '开始分析';
        }
        
        // 生成测试数据
        async function generateTestData() {
            try {
                const response = await fetch(`${API_BASE}/test/generate-data?cluster=${currentCluster}`, {
                    method: 'POST'
                });
                const result = await response.json();
                
                if (result.success) {
                    // 刷新数据
                    fetchAlerts();
                    alert('测试数据生成成功！');
                }
            } catch (error) {
                alert('生成失败: ' + error.message);
            }
        }
    </script>
</body>
</html>
